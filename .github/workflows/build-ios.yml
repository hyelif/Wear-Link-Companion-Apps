name: build-ios

# Builds the native WearLink iOS app into an .ipa for SideStore testing.
# SideStore resigns the .ipa on-device with the user's Apple ID, so the default
# path produces an AD-HOC / UNSIGNED build. Provide signing secrets (below) to
# instead produce a developer-signed build.
#
# Trigger: push to main, tags v*, manual (workflow_dispatch).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios_app

    env:
      # Set true in repo Secrets to sign with a developer p12 + provisioning profile.
      USE_CODE_SIGNING: ${{ secrets.IOS_SIGNING_P12 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: "16.0"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Generate Xcode project (XcodeGen)
        run: xcodegen generate

      - name: Create minimal workspace for archive
        run: |
          # xcodebuild archive with -project may fail if scheme isn't shared.
          # Create a minimal xcworkspace to ensure scheme resolution works.
          mkdir -p WearLink.xcworkspace
          cat > WearLink.xcworkspace/contents.xcworkspacedata <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Workspace version="1.0">
            <FileRef location="group:WearLink.xcodeproj"/>
          </Workspace>
          EOF

      - name: Run unit tests (codec)
        run: |
          # Use 'generic/platform=iOS Simulator' as a robust fallback; if a
          # specific simulator name is needed, set DESTINATION in repo vars.
          DEST="${DESTINATION:-platform=iOS Simulator,name=iPhone 16,OS=latest}"
          xcodebuild test \
            -workspace WearLink.xcworkspace \
            -scheme WearLink \
            -destination "$DEST" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Import signing certificate + profile (if secrets present)
        if: env.USE_CODE_SIGNING == 'true'
        env:
          P12: ${{ secrets.IOS_SIGNING_P12 }}          # base64
          P12_PASSWORD: ${{ secrets.IOS_SIGNING_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}  # base64
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$P12" | base64 -d > signing.p12
          security import signing.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      - name: Build + archive (unsigned for SideStore)
        if: env.USE_CODE_SIGNING != 'true'
        run: |
          # Use workspace (manually created above) so scheme resolution works
          # for archive action. No Pods integration needed — Podfile has no
          # targets, so no Pods_* framework references exist.
          #
          # Raw xcodebuild output is tee'd to build/archive.log AND piped to
          # xcpretty. PIPESTATUS[0] captures xcodebuild's real exit (xcpretty
          # otherwise masks it). On failure we cat the raw log so the actual
          # compiler/linker error is visible in the step output — no admin log
          # access needed to debug.
          set -o pipefail
          set +e
          mkdir -p build
          xcodebuild \
            -workspace WearLink.xcworkspace \
            -scheme WearLink \
            -configuration Release \
            -archivePath build/WearLink.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            archive 2>&1 | tee build/archive.log | xcpretty
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "xcodebuild archive exit: $STATUS"
          if [ "$STATUS" -ne 0 ]; then
            echo "=== RAW xcodebuild output ==="
            cat build/archive.log
            exit "$STATUS"
          fi

      - name: Inspect archive contents
        if: always() && env.USE_CODE_SIGNING != 'true'
        run: |
          # Diagnostic: show what xcodebuild actually produced. The export step
          # fails with "WearLink.app: No such file or directory" when archive
          # exits 0 but no .app lands at Products/Applications/. This reveals
          # the real archive layout so we can pinpoint the mismatch.
          echo "=== find build/WearLink.xcarchive (maxdepth 4) ==="
          find build/WearLink.xcarchive -maxdepth 4 2>/dev/null | head -80 || echo "no archive dir found"
          echo "=== Products/Applications ==="
          ls -la build/WearLink.xcarchive/Products/Applications/ 2>&1 || true
          echo "=== any .app/.appex under archive ==="
          find build/WearLink.xcarchive -name "*.app" -o -name "*.appex" 2>/dev/null || true

      - name: Export IPA (unsigned for SideStore)
        if: env.USE_CODE_SIGNING != 'true'
        run: |
          # Manual IPA packaging — no signing metadata needed.
          # SideStore resigns the .ipa on-device with the user's Apple ID.
          mkdir -p build/ipa/Payload
          APP=$(find build/WearLink.xcarchive/Products/Applications -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: no .app found in archive Products/Applications — see 'Inspect archive contents' step"
            find build/WearLink.xcarchive 2>/dev/null | head -40 || echo "no archive at all"
            exit 1
          fi
          echo "Packaging: $APP"
          cp -r "$APP" build/ipa/Payload/
          cd build/ipa && zip -r WearLink.ipa Payload/

      - name: Build + archive + export (signed, when secrets present)
        if: env.USE_CODE_SIGNING == 'true'
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace WearLink.xcworkspace \
            -scheme WearLink \
            -configuration Release \
            -archivePath build/WearLink.xcarchive \
            -destination "generic/platform=iOS" \
            -developmentTeam "$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER=build \
            archive
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.IOS_BUNDLE_ID || 'com.wearlink.app' }}</key>
              <string>build</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/WearLink.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa

      - name: Rename IPA with run tag
        run: |
          IPA=$(ls build/ipa/*.ipa | head -1)
          mv "$IPA" "build/ipa/WearLink-${GITHUB_REF_NAME:-dev}-${GITHUB_RUN_NUMBER}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WearLink-ipa
          path: ios_app/build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup keychain
        if: always() && env.USE_CODE_SIGNING == 'true'
        run: security delete-keychain build.keychain || true