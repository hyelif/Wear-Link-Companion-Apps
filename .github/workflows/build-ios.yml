name: build-ios

# Builds the native WearLink iOS app into an .ipa for SideStore testing.
# SideStore resigns the .ipa on-device with the user's Apple ID, so the default
# path produces an AD-HOC / UNSIGNED build. Provide signing secrets (below) to
# instead produce a developer-signed build.
#
# Trigger: push to main, tags v*, manual (workflow_dispatch).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios_app

    env:
      # Set true in repo Secrets to sign with a developer p12 + provisioning profile.
      USE_CODE_SIGNING: ${{ secrets.IOS_SIGNING_P12 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Install protoc + SwiftProtobuf plugin
        run: |
          brew install protobuf
          brew install swift-protobuf

      - name: Generate Swift proto sources
        run: |
          mkdir -p WearLink/Generated
          protoc \
            --swift_out=WearLink/Generated \
            -I../protocol/proto \
            ../protocol/proto/wearlink.proto

      - name: Generate Xcode project (XcodeGen)
        run: xcodegen generate

      - name: Install pods
        run: pod install

      - name: Run unit tests (codec)
        run: |
          xcodebuild test \
            -workspace WearLink.xcworkspace \
            -scheme WearLink \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.5" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Import signing certificate + profile (if secrets present)
        if: env.USE_CODE_SIGNING == 'true'
        env:
          P12: ${{ secrets.IOS_SIGNING_P12 }}          # base64
          P12_PASSWORD: ${{ secrets.IOS_SIGNING_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISION_PROFILE }}  # base64
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$P12" | base64 -d > signing.p12
          security import signing.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      - name: Build + archive (unsigned for SideStore)
        if: env.USE_CODE_SIGNING != 'true'
        run: |
          xcodebuild \
            -workspace WearLink.xcworkspace \
            -scheme WearLink \
            -configuration Release \
            -archivePath build/WearLink.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Export IPA (unsigned for SideStore)
        if: env.USE_CODE_SIGNING != 'true'
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>release-testing</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>destination</key>
            <string>export</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/WearLink.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa

      - name: Build + archive + export (signed, when secrets present)
        if: env.USE_CODE_SIGNING == 'true'
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace WearLink.xcworkspace \
            -scheme WearLink \
            -configuration Release \
            -archivePath build/WearLink.xcarchive \
            -destination "generic/platform=iOS" \
            -developmentTeam "$TEAM_ID" \
            archive
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.wearlink.app</key>
              <string>build</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/WearLink.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa

      - name: Rename IPA with run tag
        run: |
          IPA=$(ls build/ipa/*.ipa | head -1)
          mv "$IPA" "build/ipa/WearLink-${GITHUB_REF_NAME:-dev}-${GITHUB_RUN_NUMBER}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WearLink-ipa
          path: ios_app/build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup keychain
        if: always() && env.USE_CODE_SIGNING == 'true'
        run: security delete-keychain build.keychain || true