name: WearLink
options:
  bundleIdPrefix: com.wearlink
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""          # set your Apple dev team
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages: {}

targets:
  WearLink:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WearLink
    info:
      path: WearLink/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wearlink.app
        INFOPLIST_FILE: WearLink/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: WearLink/Resources/WearLink.entitlements
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    dependencies:
      - target: NotificationServiceExtension
        embed: true

  NotificationServiceExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NotificationServiceExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wearlink.app.notificationservice
        INFOPLIST_FILE: NotificationServiceExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotificationServiceExtension/NotificationServiceExtension.entitlements
        SKIP_INSTALL: YES

  WearLinkTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WearLinkTests
    dependencies:
      - target: WearLink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wearlink.app.tests
        GENERATE_INFOPLIST_FILE: YES