name: WearLink
options:
  bundleIdPrefix: com.wearlink
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""          # set your Apple dev team
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages: {}

targets:
  WearLink:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WearLink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wearlink.app
        INFOPLIST_FILE: WearLink/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: WearLink/Resources/WearLink.entitlements
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # NOTE: NotificationServiceExtension target REMOVED for SideStore (free-account)
  # unsigned builds. App extensions need a separate App ID + provisioning that
  # SideStore cannot provision on a free account, and the NSE needs APNs
  # (aps-environment) which requires a PAID Apple Developer Program. Keeping the
  # target embedded made SideStore crash / refuse to install the IPA. Source files
  # under NotificationServiceExtension/ remain on disk but are not compiled.
  # Re-add this target + the WearLink `dependencies:` embed + aps-environment
  # entitlement for a paid / App Store build.

  WearLinkTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WearLinkTests
    dependencies:
      - target: WearLink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wearlink.app.tests
        GENERATE_INFOPLIST_FILE: YES