name: wear_app
description: "WearLink — Wear OS companion app. BLE peripheral (GATT server), health collector, call/notification/music UI. Talks to native iOS app over BLE."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Reactive state — signals_dart (project-wide state mgmt choice)
  signals: ^7.1.0

  # Shared wire protocol (generated from ../protocol/proto/*.proto)
  # Pinned to 3.x — generated code uses PbList() constructor removed in 4.x+
  protobuf: ^3.1.0
  fixnum: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # protoc dart plugin output is committed; plugin listed for toolchain docs only
  # Pinned to 21.x — generated code uses PbList() constructor removed in 22.x+
  protoc_plugin: ^21.1.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true